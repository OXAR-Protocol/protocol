[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/unit/**/*.ts'"
test-fork = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/fork/**/*.ts'"

# Fast unit tests spawn a bare local validator (no clones).
[test]
startup_wait = 20000

[test.validator]
url = "https://api.mainnet-beta.solana.com"

[toolchain]
anchor_version = "0.31.1"
solana_version = "2.2.20"

[features]
resolution = true
skip-lint = false

# Program IDs are synced from target/deploy/*-keypair.json via `anchor keys sync`
# after the first build. Placeholders below are replaced on sync.
[programs.localnet]
dispatcher = "Disp1111111111111111111111111111111111111111"
kamino_usdc = "Kami1111111111111111111111111111111111111111"

[programs.devnet]
dispatcher = "Disp1111111111111111111111111111111111111111"
kamino_usdc = "Kami1111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/unit/**/*.ts'"
test-fork = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/fork/**/*.ts'"

# Fast unit tests spawn a bare local validator (no clones).
[test]
startup_wait = 20000

[test.validator]
url = "https://api.mainnet-beta.solana.com"

# Railway service config. Set Root Directory = "kora" in the Railway service settings
# so this file + the Dockerfile are picked up.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /metrics is a plain GET that only responds once the node is up.
healthcheckPath = "/metrics"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

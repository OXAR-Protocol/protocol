[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
kamino_adapter = "FhGXjrzLvpLUCTxbvN85isLpYoQG9TRnDWRTAaPdK2H9"
oxar_protocol = "8RCVjQJhfcRYVpAM8v4jhvvbhjfkdqFwPtffEKNcBQwJ"

[programs.localnet]
kamino_adapter = "FhGXjrzLvpLUCTxbvN85isLpYoQG9TRnDWRTAaPdK2H9"
oxar_protocol = "8RCVjQJhfcRYVpAM8v4jhvvbhjfkdqFwPtffEKNcBQwJ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# NOTE: `anchor test` runs these via a non-globstar shell, so `tests/**/*.ts`
# expands to `tests/*/*.ts` (nested only) and would silently SKIP the top-level
# unit suite. List both levels explicitly.
[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/*.ts tests/fork/*.ts"
test-fork = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/fork/*.ts"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.mainnet-beta.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899
# NOTE: klend's refresh_reserve does `clock.slot - reserve.last_update.slot`, which
# underflows on a fork because the validator clock starts below the cloned reserve's
# mainnet slot. `warp_slot = <near live slot>` fixes the math, but on macOS the
# accounts-hash at a warped slot blows past the open-file limit and panics. The
# robust fix is a bankrun harness with setClock — see the note in kamino-e2e.ts.
# Left unwarped so the rest of the suite runs; the refresh-dependent kamino steps
# are skipped (documented there).

[[test.validator.clone]]
address = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
# USDC mint (mainnet).


[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
kamino_adapter = "FhGXjrzLvpLUCTxbvN85isLpYoQG9TRnDWRTAaPdK2H9"
oxar_protocol = "8RCVjQJhfcRYVpAM8v4jhvvbhjfkdqFwPtffEKNcBQwJ"

[programs.localnet]
kamino_adapter = "FhGXjrzLvpLUCTxbvN85isLpYoQG9TRnDWRTAaPdK2H9"
oxar_protocol = "8RCVjQJhfcRYVpAM8v4jhvvbhjfkdqFwPtffEKNcBQwJ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
test-fork = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/fork/**/*.ts"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.mainnet-beta.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899

[[test.validator.clone]]
address = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
